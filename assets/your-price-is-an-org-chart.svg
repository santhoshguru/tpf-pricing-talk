<svg viewBox="0 0 1056 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f1e38" flood-opacity="0.16"/>
    </filter>
    <filter id="pill" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f1e38" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="priceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e6c47e"/>
      <stop offset="1" stop-color="#a9761c"/>
    </linearGradient>
  </defs>

  <rect width="1056" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="48" y="58" font-size="30" font-weight="800"><tspan fill="#0f1e38">Your Price </tspan><tspan fill="#a9761c">Is an Org Chart</tspan></text>
  <text x="48" y="86" font-size="15" fill="#5b6b82">You choose the price — the price chooses everything else.</text>

  <!-- price anchors above axis -->
  <text x="200" y="120" font-size="11.5" font-weight="600" fill="#5b6b82" text-anchor="start">$10 / mo</text>
  <text x="986" y="120" font-size="11.5" font-weight="600" fill="#5b6b82" text-anchor="end">$500K+ / yr</text>

  <!-- PRICE axis bar -->
  <rect x="200" y="126" width="786" height="32" rx="6" fill="url(#priceGrad)"/>
  <polygon points="986,124 986,160 1008,142" fill="#a9761c"/>
  <text x="593" y="147" font-size="15" font-weight="800" letter-spacing="5" fill="#ffffff" text-anchor="middle">PRICE  /  ACV</text>

  <!-- ===== COLUMN HEADERS (the forced motion) ===== -->
  <!-- Z1 -->
  <g filter="url(#soft)"><rect x="200" y="170" width="256" height="74" rx="13" fill="#4f6b93"/></g>
  <text x="328" y="200" font-size="18.5" font-weight="800" fill="#ffffff" text-anchor="middle">Self-serve / PLG</text>
  <g filter="url(#pill)"><rect x="248" y="212" width="160" height="26" rx="13" fill="#ffffff"/></g>
  <text x="328" y="230" font-size="12.5" font-weight="800" fill="#1e293b" text-anchor="middle">&#8804; $5K ACV</text>
  <!-- Z2 -->
  <g filter="url(#soft)"><rect x="468" y="170" width="256" height="74" rx="13" fill="#34506f"/></g>
  <text x="596" y="200" font-size="18.5" font-weight="800" fill="#ffffff" text-anchor="middle">Inside sales</text>
  <g filter="url(#pill)"><rect x="516" y="212" width="160" height="26" rx="13" fill="#ffffff"/></g>
  <text x="596" y="230" font-size="12.5" font-weight="800" fill="#1e293b" text-anchor="middle">$15K &#8211; 50K ACV</text>
  <!-- Z3 -->
  <g filter="url(#soft)"><rect x="736" y="170" width="256" height="74" rx="13" fill="#18263f"/></g>
  <text x="864" y="200" font-size="18.5" font-weight="800" fill="#ffffff" text-anchor="middle">Field / Enterprise</text>
  <g filter="url(#pill)"><rect x="784" y="212" width="160" height="26" rx="13" fill="#ffffff"/></g>
  <text x="864" y="230" font-size="12.5" font-weight="800" fill="#1e293b" text-anchor="middle">$100K &#8211; 500K+ ACV</text>

  <!-- ===== ROW A — who acquires ===== -->
  <text x="186" y="283" font-size="11.5" letter-spacing="1.2" font-weight="700" fill="#6b7a8f" text-anchor="end">WHO ACQUIRES</text>
  <text x="186" y="299" font-size="11.5" letter-spacing="1.2" font-weight="700" fill="#6b7a8f" text-anchor="end">THE CUSTOMER</text>
  <rect x="200" y="256" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="328" y="294" font-size="14.5" font-weight="600" fill="#1e293b" text-anchor="middle">The product itself</text>
  <rect x="468" y="256" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="596" y="294" font-size="14.5" font-weight="600" fill="#1e293b" text-anchor="middle">SDR &#8594; AE pod</text>
  <rect x="736" y="256" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="864" y="294" font-size="13.5" font-weight="600" fill="#1e293b" text-anchor="middle">AE + SE + buying committee</text>

  <!-- ===== ROW B — cost to acquire (text only) ===== -->
  <text x="186" y="359" font-size="11.5" letter-spacing="1.2" font-weight="700" fill="#6b7a8f" text-anchor="end">COST TO</text>
  <text x="186" y="375" font-size="11.5" letter-spacing="1.2" font-weight="700" fill="#6b7a8f" text-anchor="end">ACQUIRE</text>
  <rect x="200" y="332" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="328" y="371" font-size="15" font-weight="700" fill="#1e293b" text-anchor="middle">Lowest</text>
  <rect x="468" y="332" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="596" y="371" font-size="15" font-weight="700" fill="#1e293b" text-anchor="middle">Medium</text>
  <rect x="736" y="332" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="864" y="371" font-size="15" font-weight="700" fill="#1e293b" text-anchor="middle">Highest</text>

  <!-- ===== ROW C — org center of gravity ===== -->
  <text x="186" y="435" font-size="11.5" letter-spacing="1.2" font-weight="700" fill="#6b7a8f" text-anchor="end">ORG CENTER</text>
  <text x="186" y="451" font-size="11.5" letter-spacing="1.2" font-weight="700" fill="#6b7a8f" text-anchor="end">OF GRAVITY</text>
  <rect x="200" y="408" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="328" y="446" font-size="14.5" font-weight="600" fill="#1e293b" text-anchor="middle">Product · Growth · CS</text>
  <rect x="468" y="408" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="596" y="446" font-size="14.5" font-weight="600" fill="#1e293b" text-anchor="middle">Sales + CS</text>
  <rect x="736" y="408" width="256" height="66" rx="10" fill="#eef2f7" stroke="#dce3ec"/>
  <text x="864" y="446" font-size="14.5" font-weight="600" fill="#1e293b" text-anchor="middle">Sales · SE · Success</text>

</svg>
