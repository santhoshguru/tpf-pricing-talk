<svg viewBox="0 0 880 780" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f1e38" flood-opacity="0.18"/>
    </filter>
    <filter id="pill" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f1e38" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowUp" markerWidth="12" markerHeight="12" refX="6" refY="2.5" orient="auto">
      <path d="M1,9 L6,1 L11,9" fill="none" stroke="#c9952f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="880" height="780" fill="#ffffff"/>

  <!-- Title block -->
  <text x="56" y="50" font-size="13" letter-spacing="3" font-weight="700" fill="#c9952f">WHERE THE PRICE COMES FROM</text>
  <text x="56" y="92" font-size="34" font-weight="800" fill="#0f1e38">The Cost Stack</text>
  <text x="56" y="122" font-size="15.5" fill="#5b6b82">Every layer repackages the one below it — into a brand-new unit you pay for.</text>

  <!-- plate shadow under the cake -->
  <ellipse cx="398" cy="736" rx="360" ry="12" fill="#0f1e38" opacity="0.06"/>

  <!-- ===== LAYER 6 — top ===== -->
  <g filter="url(#soft)">
    <rect x="56" y="156" width="684" height="84" rx="12" fill="#c9952f"/>
  </g>
  <circle cx="92" cy="198" r="16" fill="rgba(0,0,0,0.10)" stroke="rgba(0,0,0,0.35)" stroke-width="1.5"/>
  <text x="92" y="203" font-size="16" font-weight="800" fill="#1c1404" text-anchor="middle">6</text>
  <text x="122" y="192" font-size="20" font-weight="800" fill="#1c1404">The product you buy</text>
  <text x="122" y="216" font-size="12.5" fill="#5a4413">Notion · Salesforce · Intercom</text>
  <g filter="url(#pill)"><rect x="516" y="179" width="210" height="38" rx="19" fill="#ffffff"/></g>
  <text x="621" y="204" font-size="15.5" font-weight="800" fill="#1e293b" text-anchor="middle">$ / seat · use · outcome</text>

  <!-- chevron -->
  <path d="M391,251 L398,243 L405,251" fill="none" stroke="#c2cad6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== LAYER 5 ===== -->
  <g filter="url(#soft)">
    <rect x="56" y="254" width="684" height="84" rx="12" fill="#4f6b93"/>
  </g>
  <circle cx="92" cy="296" r="16" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="92" y="301" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">5</text>
  <text x="122" y="290" font-size="20" font-weight="800" fill="#ffffff">The AI model</text>
  <text x="122" y="314" font-size="12.5" fill="#ffffff" opacity="0.78">OpenAI · Anthropic · Google</text>
  <g filter="url(#pill)"><rect x="516" y="277" width="210" height="38" rx="19" fill="#ffffff"/></g>
  <text x="621" y="302" font-size="15.5" font-weight="800" fill="#1e293b" text-anchor="middle">$ / million tokens</text>

  <path d="M391,349 L398,341 L405,349" fill="none" stroke="#c2cad6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== LAYER 4 ===== -->
  <g filter="url(#soft)">
    <rect x="56" y="352" width="684" height="84" rx="12" fill="#3c5885"/>
  </g>
  <circle cx="92" cy="394" r="16" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="92" y="399" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">4</text>
  <text x="122" y="388" font-size="20" font-weight="800" fill="#ffffff">The cloud</text>
  <text x="122" y="412" font-size="12.5" fill="#ffffff" opacity="0.78">AWS · Azure · Google Cloud · CoreWeave</text>
  <g filter="url(#pill)"><rect x="516" y="375" width="210" height="38" rx="19" fill="#ffffff"/></g>
  <text x="621" y="400" font-size="15.5" font-weight="800" fill="#1e293b" text-anchor="middle">$ / GPU-hour</text>

  <path d="M391,447 L398,439 L405,447" fill="none" stroke="#c2cad6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== LAYER 3 ===== -->
  <g filter="url(#soft)">
    <rect x="56" y="450" width="684" height="84" rx="12" fill="#2d456b"/>
  </g>
  <circle cx="92" cy="492" r="16" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="92" y="497" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
  <text x="122" y="486" font-size="20" font-weight="800" fill="#ffffff">The data center</text>
  <text x="122" y="510" font-size="12.5" fill="#ffffff" opacity="0.78">Equinix · Digital Realty · Crusoe</text>
  <g filter="url(#pill)"><rect x="516" y="473" width="210" height="38" rx="19" fill="#ffffff"/></g>
  <text x="621" y="498" font-size="15.5" font-weight="800" fill="#1e293b" text-anchor="middle">$ / megawatt</text>

  <path d="M391,545 L398,537 L405,545" fill="none" stroke="#c2cad6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== LAYER 2 ===== -->
  <g filter="url(#soft)">
    <rect x="56" y="548" width="684" height="84" rx="12" fill="#1e3252"/>
  </g>
  <circle cx="92" cy="590" r="16" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="92" y="595" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
  <text x="122" y="584" font-size="20" font-weight="800" fill="#ffffff">The chips</text>
  <text x="122" y="608" font-size="12.5" fill="#ffffff" opacity="0.78">Nvidia · TSMC · ASML · SK Hynix</text>
  <g filter="url(#pill)"><rect x="516" y="571" width="210" height="38" rx="19" fill="#ffffff"/></g>
  <text x="621" y="596" font-size="15.5" font-weight="800" fill="#1e293b" text-anchor="middle">$ / chip</text>

  <path d="M391,643 L398,635 L405,643" fill="none" stroke="#c2cad6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== LAYER 1 — bottom / bedrock ===== -->
  <g filter="url(#soft)">
    <rect x="56" y="646" width="684" height="84" rx="12" fill="#0f1e38"/>
  </g>
  <circle cx="92" cy="688" r="16" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="92" y="693" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
  <text x="122" y="682" font-size="20" font-weight="800" fill="#ffffff">Energy &amp; water</text>
  <text x="122" y="706" font-size="12.5" fill="#ffffff" opacity="0.78">Power grid · gas · nuclear deals · cooling</text>
  <g filter="url(#pill)"><rect x="516" y="669" width="210" height="38" rx="19" fill="#ffffff"/></g>
  <text x="621" y="694" font-size="15.5" font-weight="800" fill="#1e293b" text-anchor="middle">$ / kWh</text>

  <!-- ===== Re-meter spine (the thesis) ===== -->
  <line x1="772" y1="728" x2="772" y2="160" stroke="#c9952f" stroke-width="2.6" marker-end="url(#arrowUp)"/>
  <text x="798" y="444" font-size="13" font-weight="700" letter-spacing="1.5" fill="#c9952f" text-anchor="middle" transform="rotate(-90 798 444)">the same $ — re-metered 6× up the stack</text>

  <!-- bottom caption -->
  <text x="398" y="762" font-size="13" fill="#5b6b82" text-anchor="middle" font-style="italic">Bottom = the cost you can't escape   ·   Top = the price the customer sees</text>
</svg>